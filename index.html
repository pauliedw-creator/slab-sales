<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GLG — Slab Sales</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #edeae4; --surface: #fff; --border: #dbd6ce;
      --nav: #1a1a18; --gold: #c9a84c; --gold-dark: #b8860b; --gold-light: #e8c96a;
      --nav-divider: #3a3830; --nav-sub: #6a6050;
      --text: #2c2c2c; --text-muted: #888; --text-faint: #bbb;
      --success: #2d7a4a; --success-bg: #e8f7ee; --success-border: #b8e4c8;
      --error: #c0392b; --error-bg: #fde8e8; --error-border: #f0b8b8;
      --info: #4a6abf; --info-bg: #f0f4ff; --info-border: #c0ccf0;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; font-size: 13.5px; color: var(--text); background: var(--bg); min-height: 100vh; }

    /* NAV */
    nav { background: var(--nav); height: 48px; display: flex; align-items: center; padding: 0 16px; position: sticky; top: 0; z-index: 100; }
    .nav-logo { display: flex; align-items: center; }
    .nav-logo img { height: 36px; }
    .nav-divider { width: 1px; height: 24px; background: var(--nav-divider); margin: 0 14px; }
    .nav-brand { color: var(--gold); font-size: 13px; font-weight: 500; letter-spacing: 0.04em; }
    .nav-sub { color: var(--nav-sub); font-size: 11px; margin-left: 8px; }
    .nav-spacer { flex: 1; }
    .lang-toggle { display: flex; gap: 2px; }
    .btn-lang { background: none; border: 1px solid var(--nav-divider); border-radius: 3px; padding: 4px 9px; font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 500; color: var(--nav-sub); cursor: pointer; letter-spacing: 0.06em; transition: all 0.15s; }
    .btn-lang.active { background: var(--gold); border-color: var(--gold); color: #1a1a18; }
    .btn-lang:not(.active):hover { border-color: #6a6050; color: #a09070; }

    /* LAYOUT */
    .container { max-width: 1080px; margin: 0 auto; padding: 0 16px; }

    /* STAT CARDS */
    .stat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 16px 0 10px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 14px 18px; }
    .stat-label { font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-faint); margin-bottom: 6px; }
    .stat-value { font-size: 24px; font-weight: 500; color: #1a1a18; line-height: 1; }
    .stat-value.gold { color: var(--gold); }

    /* CARDS */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; margin-bottom: 10px; }
    .card-title { font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-faint); padding: 12px 22px 0; }
    .card-body { padding: 14px 22px 24px; }

    /* FORM */
    .form-row { display: flex; gap: 12px; margin-bottom: 10px; flex-wrap: wrap; align-items: flex-end; }
    .form-row:last-child { margin-bottom: 0; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group.grow { flex: 1; min-width: 140px; }
    .form-group.w-160 { width: 160px; flex-shrink: 0; }
    .form-group.w-120 { width: 120px; flex-shrink: 0; }
    .form-group.w-100 { width: 100px; flex-shrink: 0; }
    .form-group.w-90  { width: 90px;  flex-shrink: 0; }
    label { font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }
    input[type=text], input[type=number], input[type=date], select { border: 1px solid var(--border); border-radius: 3px; padding: 7px 10px; font-family: 'DM Sans', sans-serif; font-size: 13.5px; color: var(--text); background: #fff; outline: none; transition: border-color 0.15s; width: 100%; }
    input:focus, select:focus { border-color: var(--gold); }
    .input-unit { position: relative; display: flex; align-items: center; }
    .input-unit input { padding-right: 32px; }
    .unit-suffix { position: absolute; right: 9px; font-size: 11px; color: var(--text-muted); pointer-events: none; }

    /* CALC DISPLAY */
    .calc-display { display: flex; align-items: center; padding: 7px 10px; background: #f8f6f2; border: 1px solid var(--border); border-radius: 3px; font-size: 13.5px; font-weight: 500; color: var(--info); min-height: 34px; white-space: nowrap; }
    .calc-display.empty { color: var(--text-faint); font-weight: 400; }

    /* OVERRIDE BADGE */
    .override-badge { display: inline-flex; align-items: center; background: #fff4e0; border: 1px solid #f0c060; color: #a06000; font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; padding: 2px 7px; border-radius: 3px; font-weight: 500; }
    .override-badge.hidden { display: none; }
    .btn-reset { background: none; border: 1px solid var(--border); border-radius: 3px; padding: 5px 10px; font-size: 11px; color: var(--text-muted); cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s; white-space: nowrap; flex-shrink: 0; }
    .btn-reset:hover { border-color: var(--gold); color: var(--gold-dark); }

    /* LINE ITEM CARDS */
    .line-item-card { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; margin-bottom: 8px; }
    .line-item-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 22px; border-bottom: 1px solid #f0ece6; background: #faf9f7; border-radius: 4px 4px 0 0; }
    .line-item-num { font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-faint); font-weight: 500; }
    .btn-remove-line { background: none; border: 1px solid #e0d8cf; border-radius: 3px; padding: 3px 10px; font-size: 11px; color: var(--error); cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
    .btn-remove-line:hover { background: var(--error-bg); border-color: var(--error); }
    .line-item-body { padding: 14px 22px 18px; }

    /* ADD LINE */
    .btn-add-line { display: flex; align-items: center; gap: 8px; background: none; border: 1px dashed #c8c0b6; border-radius: 4px; padding: 12px 22px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--text-muted); cursor: pointer; width: 100%; transition: all 0.15s; margin-bottom: 10px; }
    .btn-add-line:hover { border-color: var(--gold); color: var(--gold-dark); background: #faf7f0; border-style: solid; }
    .btn-add-plus { font-size: 18px; line-height: 1; color: var(--gold); }

    /* ORDER TOTAL + DEPOSIT */
    .order-total-bar { display: flex; align-items: center; justify-content: space-between; padding: 16px 22px; border-bottom: 1px solid #f0ece6; }
    .order-total-label { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-muted); }
    .order-total-value { font-size: 28px; font-weight: 500; color: #1a1a18; }
    .deposit-section { padding: 16px 22px 16px; border-bottom: 1px solid #f0ece6; }
    .deposit-row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
    .collect-bar { display: flex; align-items: center; justify-content: space-between; padding: 14px 22px; }
    .collect-label { font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-muted); }
    .collect-value { font-size: 20px; font-weight: 500; color: var(--gold); }

    /* PAYMENT PILLS */
    .payment-pills { display: flex; gap: 6px; }
    .payment-pills input[type=radio] { display: none; }
    .payment-pill { border: 1px solid var(--border); border-radius: 3px; padding: 6px 14px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--text-muted); cursor: pointer; transition: all 0.15s; user-select: none; white-space: nowrap; display: block; }
    .payment-pills input[type=radio]:checked + .payment-pill { background: #f0f8f4; border-color: #2d7a4a; color: var(--success); font-weight: 500; }
    .payment-pill:hover { border-color: var(--gold); color: var(--gold-dark); }

    /* DISCOUNT TYPE TOGGLE */
    .disc-type-pills { display: flex; gap: 6px; }
    .disc-type-pills input[type=radio] { display: none; }
    .disc-type-pill { border: 1px solid var(--border); border-radius: 3px; padding: 6px 16px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--text-muted); cursor: pointer; transition: all 0.15s; user-select: none; font-weight: 500; display: block; }
    .disc-type-pills input[type=radio]:checked + .disc-type-pill { background: #fef8ec; border-color: var(--gold); color: var(--gold-dark); font-weight: 500; }
    .disc-type-pill:hover { border-color: var(--gold); color: var(--gold-dark); }

    /* ORDER TOTAL BREAKDOWN */
    .total-breakdown { padding: 14px 22px 0; }
    .breakdown-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; }
    .breakdown-label { font-size: 12px; color: var(--text-muted); }
    .breakdown-value { font-size: 13px; font-weight: 500; color: var(--text); }
    .breakdown-row.discount-row { display: none; }
    .breakdown-row.discount-row.visible { display: flex; }
    .breakdown-row.discount-row .breakdown-label { color: var(--error); }
    .breakdown-row.discount-row .breakdown-value { color: var(--error); }
    .breakdown-divider { border: none; border-top: 1px solid var(--border); margin: 8px 0 0; }
    .order-total-bar { display: flex; align-items: center; justify-content: space-between; padding: 12px 22px; border-bottom: 1px solid #f0ece6; }

    /* SUBMIT */
    .btn-submit { width: 100%; background: var(--gold); border: none; border-radius: 3px; padding: 12px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; color: #1a1a18; cursor: pointer; transition: background 0.15s; }
    .btn-submit:hover { background: var(--gold-light); }
    .btn-submit:disabled { background: var(--border); color: var(--text-muted); cursor: not-allowed; }
    .status-msg { border-radius: 3px; padding: 10px 14px; font-size: 13px; margin-bottom: 10px; display: none; }

    /* HISTORY */
    .history-header { display: flex; align-items: center; gap: 10px; padding: 12px 22px; cursor: pointer; user-select: none; }
    .history-header:hover { background: #faf9f7; border-radius: 4px; }
    .history-title { font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-faint); flex: 1; }
    .history-count { background: var(--gold); color: #1a1a18; font-size: 10px; font-weight: 500; padding: 1px 8px; border-radius: 10px; min-width: 24px; text-align: center; }
    .history-chevron { font-size: 10px; color: var(--text-muted); transition: transform 0.2s; }
    .history-chevron.open { transform: rotate(180deg); }
    .history-body { display: none; padding: 0 22px 18px; border-top: 1px solid var(--border); }
    .history-body.open { display: block; }
    .history-controls { display: flex; gap: 8px; padding: 12px 0 10px; }
    .btn-sm { background: none; border: 1px solid var(--border); border-radius: 3px; padding: 5px 12px; font-family: 'DM Sans', sans-serif; font-size: 11px; color: var(--text-muted); cursor: pointer; transition: all 0.15s; }
    .btn-sm:hover { border-color: var(--gold); color: var(--gold-dark); }
    .history-table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th { font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-muted); font-weight: 500; padding: 6px 10px; text-align: left; border-bottom: 1px solid var(--border); background: #faf9f7; white-space: nowrap; }
    td { padding: 7px 10px; border-bottom: 1px solid #f0ece6; color: var(--text); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr.order-break td { border-top: 2px solid var(--border); }
    tr:hover td { background: #faf9f7; }
    .order-ref { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-muted); background: #f0ece6; padding: 2px 6px; border-radius: 2px; white-space: nowrap; }
    .payment-tag { font-size: 10px; padding: 2px 7px; border-radius: 3px; font-weight: 500; }
    .payment-tag.cash { background: #f0f8f4; color: var(--success); border: 1px solid #b8e4c8; }
    .payment-tag.bank { background: var(--info-bg); color: var(--info); border: 1px solid var(--info-border); }

    /* RESPONSIVE */
    @media (max-width: 700px) {
      .nav-brand { display: none; }
      .form-group.w-160, .form-group.w-120, .form-group.w-100, .form-group.w-90 { flex: 1; width: auto; }
      th:nth-child(n+8), td:nth-child(n+8) { display: none; }
    }
    @media (max-width: 400px) {
      .stat-value { font-size: 20px; }
    }
  </style>
</head>
<body>

  <nav>
    <div class="nav-logo"><img id="navLogo" src="" alt="GLG"></div>
    <div class="nav-divider"></div>
    <span class="nav-brand">Golden Leaf Granit</span>
    <span class="nav-sub" data-i18n="navSub">Slab Sales</span>
    <div class="nav-spacer"></div>
    <div class="lang-toggle">
      <button class="btn-lang active" id="btnEN" onclick="setLang('EN')">EN</button>
      <button class="btn-lang"        id="btnPL" onclick="setLang('PL')">PL</button>
    </div>
  </nav>

  <div class="container">

    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-label" data-i18n="statLinesLabel">Lines in Order</div>
        <div class="stat-value" id="statLines">1</div>
      </div>
      <div class="stat-card">
        <div class="stat-label" data-i18n="statTotalLabel">Order Total</div>
        <div class="stat-value gold" id="statTotal">&#8212;</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title" data-i18n="orderDetailsTitle">Order Details</div>
      <div class="card-body">
        <div class="form-row">
          <div class="form-group grow">
            <label data-i18n="labelCustomer">Customer Name</label>
            <input type="text" id="customerName" list="customerList"
              data-i18n-ph="phCustomer" placeholder="Start typing customer name&#8230;" autocomplete="off">
            <datalist id="customerList"></datalist>
          </div>
          <div class="form-group w-120">
            <label data-i18n="labelSaleDate">Sale Date</label>
            <input type="date" id="saleDate">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group grow">
            <label data-i18n="labelOrderNotes">Order Notes</label>
            <input type="text" id="orderNotes"
              data-i18n-ph="phOrderNotes" placeholder="Delivery instructions, special requirements&#8230;">
          </div>
        </div>
      </div>
    </div>

    <div id="lineItemsContainer"></div>

    <button class="btn-add-line" onclick="addLine()">
      <span class="btn-add-plus">+</span>
      <span data-i18n="addSlabBtn">Add another slab</span>
    </button>

    <div class="card">
      <div class="card-title" data-i18n="transportTitle">Transport</div>
      <div class="card-body" style="padding-bottom:18px;">
        <div class="form-row" style="margin-bottom:0;">
          <div class="form-group w-160">
            <label data-i18n="labelTransport">Transport Cost</label>
            <div class="input-unit">
              <input type="number" id="transportCost" placeholder="" min="-999999" step="1" oninput="recalcOrderTotal();recalcDeposit();updateStats();">
              <span class="unit-suffix">z&#322;</span>
            </div>
          </div>
          <div class="form-group grow" style="justify-content:flex-end;">
            <div style="font-size:11px;color:var(--text-muted);padding-bottom:9px;" data-i18n="transportHint">Included in order total</div>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title" data-i18n="discountTitle">Discount</div>
      <div class="card-body" style="padding-bottom:18px;">
        <div class="form-row" style="margin-bottom:0;">
          <div class="form-group w-160">
            <label data-i18n="labelDiscount">Discount Amount</label>
            <div class="input-unit">
              <input type="number" id="discountValue" placeholder="" min="0" step="1" oninput="recalcOrderTotal();recalcDeposit();updateStats();">
              <span class="unit-suffix" id="discountSuffix">z&#322;</span>
            </div>
          </div>
          <div class="form-group grow">
            <label data-i18n="labelDiscountType">Discount Type</label>
            <div class="disc-type-pills">
              <label>
                <input type="radio" name="discountType" value="zl" checked onchange="onDiscountTypeChange()">
                <span class="disc-type-pill">z&#322;</span>
              </label>
              <label>
                <input type="radio" name="discountType" value="pct" onchange="onDiscountTypeChange()">
                <span class="disc-type-pill">%</span>
              </label>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="total-breakdown" id="totalBreakdown">
        <div class="breakdown-row">
          <span class="breakdown-label" data-i18n="subtotalLabel">Subtotal</span>
          <span class="breakdown-value" id="subtotalDisplay">0 z&#322;</span>
        </div>
        <div class="breakdown-row discount-row" id="discountBreakdownRow">
          <span class="breakdown-label" id="discountBreakdownLabel" data-i18n="discountApplied">Discount applied</span>
          <span class="breakdown-value" id="discountBreakdownValue">&minus;0 z&#322;</span>
        </div>
        <hr class="breakdown-divider">
      </div>
      <div class="order-total-bar">
        <span class="order-total-label" data-i18n="orderTotalLabel">Order Total</span>
        <span class="order-total-value" id="orderTotalDisplay">0 z&#322;</span>
      </div>
      <div class="deposit-section">
        <div class="deposit-row">
          <div class="form-group w-160">
            <label data-i18n="labelDeposit">Deposit Taken</label>
            <div class="input-unit">
              <input type="number" id="depositAmount" placeholder="e.g. 500" min="0" step="1" oninput="recalcDeposit()">
              <span class="unit-suffix">z&#322;</span>
            </div>
          </div>
          <div class="form-group grow">
            <label data-i18n="labelPaymentMethod">Payment Method</label>
            <div class="payment-pills">
              <label>
                <input type="radio" name="paymentMethod" value="Cash" checked onchange="recalcDeposit()">
                <span class="payment-pill" data-i18n="paymentCash">Cash</span>
              </label>
              <label>
                <input type="radio" name="paymentMethod" value="Bank Transfer" onchange="recalcDeposit()">
                <span class="payment-pill" data-i18n="paymentBank">Bank Transfer</span>
              </label>
            </div>
          </div>
        </div>
      </div>
      <div class="collect-bar">
        <span class="collect-label" data-i18n="balanceLabel">Balance to Collect</span>
        <span class="collect-value" id="balanceDisplay">0 z&#322;</span>
      </div>
    </div>

    <div class="card">
      <div class="card-title" data-i18n="saveCardTitle">Save to Google Sheet</div>
      <div class="card-body">
        <div class="status-msg" id="statusMsg"></div>
        <button class="btn-submit" id="submitBtn" onclick="submitOrder()">
          <span data-i18n="submitBtn">Accept &amp; Submit</span>
        </button>
      </div>
    </div>

    <div class="card" style="margin-bottom:32px;">
      <div class="history-header" onclick="toggleHistory()">
        <span class="history-title" data-i18n="historyTitle">Submission History</span>
        <span class="history-count" id="historyCount">&#8212;</span>
        <span class="history-chevron" id="historyChevron">&#9660;</span>
      </div>
      <div class="history-body" id="historyBody">
        <div class="history-controls">
          <button class="btn-sm" onclick="fetchAndRenderHistory()" data-i18n="btnRefresh">Refresh</button>
          <button class="btn-sm" onclick="clearHistoryCache()" data-i18n="btnClearCache">Clear local cache</button>
        </div>
        <div id="historyContent">
          <p style="color:var(--text-muted);font-size:12px;" data-i18n="historyEmpty">Click Refresh to load history.</p>
        </div>
      </div>
    </div>

  </div>

  <script>

    function setLang(lang) {
      currentLang = lang;

      document.getElementById('btnPL').classList.toggle('active', lang === 'PL');
      var els = document.querySelectorAll('[data-i18n]');
      for (var i = 0; i < els.length; i++) {
        els[i].textContent = t(els[i].getAttribute('data-i18n'));
      }
      var phEls = document.querySelectorAll('[data-i18n-ph]');
      for (var j = 0; j < phEls.length; j++) {

      updateAllLineLabels();
    }

      var ids = getLineIds();
      for (var i = 0; i < ids.length; i++) {
        var id = ids[i];
        var num = document.getElementById('lineNum-' + id);
        if (num) { num.textContent = t('slabCardLabel') + ' ' + (i + 1); }
        var pairs = [
          ['lbl-slabName-'  + id, 'labelSlabName'],
          ['lbl-length-'    + id, 'labelLength'],
          ['lbl-width-'     + id, 'labelWidth'],
          ['lbl-thickness-' + id, 'labelThickness'],
          ['lbl-area-'      + id, 'labelArea'],

          ['lbl-badge-'     + id, 'overrideBadge'],

        ];
        for (var p = 0; p < pairs.length; p++) {

      }
    }

    // ─── IFRAME POST ─────────────────────────────────────────────────────────
    function iframePost(url, data) {
      return new Promise(function (resolve) {
        var iframe = document.getElementById('_submitFrame');
        if (!iframe) {
          iframe = document.createElement('iframe');
          iframe.id = '_submitFrame'; iframe.name = '_submitFrame';
          iframe.style.display = 'none';
          document.body.appendChild(iframe);
        }
        var form = document.createElement('form');
        form.method = 'POST'; form.action = url; form.target = '_submitFrame';
        var inp = document.createElement('input');
        inp.type = 'hidden'; inp.name = 'payload'; inp.value = JSON.stringify(data);
        form.appendChild(inp);
        document.body.appendChild(form);
        iframe.onload = function () { try { document.body.removeChild(form); } catch (e) {} resolve(); };
        form.submit();
        setTimeout(function () { try { document.body.removeChild(form); } catch (e) {} resolve(); }, 4000);
      });
    }

    function removeLine(id) {
      if (getLineIds().length <= 1) { return; }
      delete lineState[id];
      var el = document.getElementById('line-' + id);
      if (el) { el.parentNode.removeChild(el); }
      updateLineNumbers();
      recalcOrderTotal();
      recalcDeposit();
      updateStats();
    }

    function updateLineNumbers() {
      var ids = getLineIds();
      for (var i = 0; i < ids.length; i++) {
        var el = document.getElementById('lineNum-' + ids[i]);
        if (el) { el.textContent = t('slabCardLabel') + ' ' + (i + 1); }
      }
    }

    function getLineIds() {
      var cards = document.querySelectorAll('.line-item-card');
      var ids = [];
      for (var i = 0; i < cards.length; i++) {
        ids.push(parseInt(cards[i].id.replace('line-', ''), 10));
      }
      return ids;
    }

    // ─── CALCULATIONS ─────────────────────────────────────────────────────────
    function recalcLine(id) {
      var length     = parseFloat(document.getElementById('length-'  + id).value) || 0;
      var width      = parseFloat(document.getElementById('width-'   + id).value) || 0;
      var pricePerM2 = parseFloat(document.getElementById('priceM2-' + id).value) || 0;
      var areaSqM    = (length > 0 && width > 0) ? (length * width) / 10000 : 0;
      var areaEl     = document.getElementById('area-' + id);

      if (areaSqM > 0) {
        areaEl.textContent = areaSqM.toFixed(2) + ' m\u00b2';
        areaEl.classList.remove('empty');
      } else {
        areaEl.textContent = '\u2014';
        areaEl.classList.add('empty');
      }

      var suggested = (areaSqM > 0 && pricePerM2 > 0) ? Math.ceil(areaSqM * pricePerM2) : null;
      lineState[id].suggested = suggested;

      if (!lineState[id].touched && suggested !== null) {
        document.getElementById('lineTotal-' + id).value = suggested;
      }
      updateOverrideBadge(id);
      recalcOrderTotal();
      recalcDeposit();
      updateStats();
    }

    function onLineTotalEdit(id) {
      lineState[id].touched = true;
      updateOverrideBadge(id);
      recalcOrderTotal();
      recalcDeposit();
      updateStats();
    }

    function resetLineTotal(id) {
      lineState[id].touched = false;
      recalcLine(id);
    }

    function updateOverrideBadge(id) {
      var badge = document.getElementById('badge-' + id);
      if (!badge) { return; }
      var val = parseFloat(document.getElementById('lineTotal-' + id).value) || 0;
      var suggested = lineState[id].suggested;
      var isOverride = lineState[id].touched && suggested !== null && Math.abs(val - suggested) > 0.01;
      badge.classList.toggle('hidden', !isOverride);
    }

    function getDiscountZl(subtotal) {
      var raw  = document.getElementById('discountValue').value;
      if (raw === '') { return 0; }
      var val  = parseFloat(raw) || 0;
      var type = document.querySelector('input[name="discountType"]:checked').value;
      if (type === 'pct') { return Math.round(subtotal * val / 100); }
      return Math.round(val);
    }

    function onDiscountTypeChange() {
      var type   = document.querySelector('input[name="discountType"]:checked').value;
      document.getElementById('discountSuffix').textContent = type === 'pct' ? '%' : 'zł';
      recalcOrderTotal(); recalcDeposit(); updateStats();
    }

    function recalcOrderTotal() {
      var ids = getLineIds(); var subtotal = 0;
      for (var i = 0; i < ids.length; i++) {
        subtotal += parseFloat(document.getElementById('lineTotal-' + ids[i]).value) || 0;
      }
      var tcRaw = document.getElementById('transportCost').value;
      subtotal += tcRaw !== '' ? (parseFloat(tcRaw) || 0) : 0;

      var discountZl = getDiscountZl(subtotal);
      var total      = subtotal - discountZl;

      // Update subtotal display
      document.getElementById('subtotalDisplay').textContent = fmtCurrency(subtotal);

      // Show/hide discount row
      var discRow = document.getElementById('discountBreakdownRow');
      if (discountZl > 0) {
        discRow.classList.add('visible');
        var type = document.querySelector('input[name="discountType"]:checked').value;
        var raw  = document.getElementById('discountValue').value;
        var lbl  = type === 'pct'
          ? (t('discountApplied') + ' (' + (parseFloat(raw) || 0) + '%)')
          : t('discountApplied');
        document.getElementById('discountBreakdownLabel').textContent = lbl;
        document.getElementById('discountBreakdownValue').textContent = '−' + fmtCurrency(discountZl);
      } else {
        discRow.classList.remove('visible');
      }

      document.getElementById('orderTotalDisplay').textContent = fmtCurrency(total);
      return total;
    }

    function recalcDeposit() {
      var total   = recalcOrderTotal();
      var deposit = parseFloat(document.getElementById('depositAmount').value) || 0;
      document.getElementById('balanceDisplay').textContent = fmtCurrency(Math.max(0, total - deposit));
    }

    function getPaymentMethod() {
      var radios = document.querySelectorAll('input[name="paymentMethod"]');
      for (var i = 0; i < radios.length; i++) { if (radios[i].checked) { return radios[i].value; } }
      return 'Cash';
    }

    function updateStats() {
      var ids = getLineIds(); var total = recalcOrderTotal();
      document.getElementById('statLines').textContent = ids.length;
      document.getElementById('statTotal').textContent = total > 0 ? fmtCurrency(total) : '\u2014';
    }

    // ─── SUBMISSION ───────────────────────────────────────────────────────────
    function generateOrderId() {
      return 'ORD-' + todayISO().replace(/-/g, '') + '-' + Math.floor(1000 + Math.random() * 9000);
    }

    function submitOrder() {
      var customerName  = document.getElementById('customerName').value.trim();
      var saleDate      = document.getElementById('saleDate').value;
      var orderNotes    = document.getElementById('orderNotes').value.trim();
      var deposit       = parseFloat(document.getElementById('depositAmount').value) || 0;
      var paymentMethod = getPaymentMethod();
      var ids           = getLineIds();

      if (!customerName) { setStatus('error', t('errNoCustomer')); return; }
      if (!saleDate)      { setStatus('error', t('errNoDate'));     return; }

      var rows = []; var valid = true;
      for (var i = 0; i < ids.length; i++) {
        var id        = ids[i];
        var slabName  = document.getElementById('slabName-' + id).value.trim();
        var lineTotal = parseFloat(document.getElementById('lineTotal-' + id).value) || 0;
        if (!slabName)     { setStatus('error', t('errNoSlab').replace('{n}',  i + 1)); valid = false; break; }
        if (lineTotal <= 0){ setStatus('error', t('errNoTotal').replace('{n}', i + 1)); valid = false; break; }

        var rowLength = parseFloat(document.getElementById('length-' + id).value) || 0;
        var rowWidth  = parseFloat(document.getElementById('width-'  + id).value) || 0;
        var dimStr    = (rowLength > 0 && rowWidth > 0) ? ' - ' + rowLength + 'cm x ' + rowWidth + 'cm' : '';
        var itemName  = slabName + dimStr;

        rows.push({
          saleDate: saleDate, customerName: customerName, slabName: slabName,
          itemName: itemName,
          length:    Math.round(rowLength),
          width:     Math.round(rowWidth),
          thickness: Math.round(parseFloat(document.getElementById('thickness-' + id).value) || 0),
          areaSqM:   (rowLength > 0 && rowWidth > 0) ? parseFloat(((rowLength * rowWidth) / 10000).toFixed(2)) : 0,
          pricePerM2: parseFloat(document.getElementById('priceM2-'  + id).value) || 0,
          lineTotal: lineTotal, orderNotes: orderNotes
        });
      }
      if (!valid) { return; }

      var orderId    = generateOrderId();
      var orderTotal = recalcOrderTotal();
      var balance    = Math.max(0, orderTotal - deposit);

      var subtotalForDisc = 0;
      for (var si = 0; si < rows.length; si++) { subtotalForDisc += rows[si].lineTotal || 0; }
      var tcValFinal = document.getElementById('transportCost').value;
      subtotalForDisc += tcValFinal !== '' ? (parseFloat(tcValFinal) || 0) : 0;
      var discountZlFinal  = getDiscountZl(subtotalForDisc);
      var discountRaw      = document.getElementById('discountValue').value;
      var discountTypeFinal = document.querySelector('input[name="discountType"]:checked').value;
      var discountLabel    = discountTypeFinal === 'pct'
        ? ((parseFloat(discountRaw) || 0) + '%')
        : (discountZlFinal + ' zł');

      for (var j = 0; j < rows.length; j++) {
        rows[j].orderId = orderId; rows[j].orderTotal = orderTotal;
        rows[j].deposit = deposit; rows[j].paymentMethod = paymentMethod;
        rows[j].toCollect = balance;
        var tcVal = document.getElementById('transportCost').value;
        rows[j].transportCost = tcVal !== '' ? (parseFloat(tcVal) || 0) : 0;
        rows[j].discountZl    = discountZlFinal;
        rows[j].discountLabel = discountZlFinal > 0 ? discountLabel : '';
      }

      var submitEl   = document.getElementById('submitBtn');
      var submitSpan = submitEl.querySelector('[data-i18n="submitBtn"]');
      submitEl.disabled = true;
      var submittingMsg = t('submitting').replace('{n}', rows.length);
      if (submitSpan) { submitSpan.textContent = submittingMsg; }
      setStatus('info', submittingMsg);

      var chain = Promise.resolve();
      for (var k = 0; k < rows.length; k++) {
        (function(row) { chain = chain.then(function() { return iframePost(SCRIPT_URL, row); }); })(rows[k]);
      }

      chain.then(function() {
        setStatus('success', t('submitOk').replace('{id}', orderId).replace('{n}', rows.length));
        submitEl.disabled = false;
        if (submitSpan) { submitSpan.textContent = t('submitBtn'); }
        resetForm();
        fetchAndRenderHistory();
      }).catch(function() {
        setStatus('error', t('submitErr'));
        submitEl.disabled = false;
        if (submitSpan) { submitSpan.textContent = t('submitBtn'); }
      });
    }

    function resetForm() {
      document.getElementById('customerName').value  = '';
      document.getElementById('orderNotes').value    = '';
      document.getElementById('depositAmount').value = '';
      document.getElementById('saleDate').value      = todayISO();
      var radios = document.querySelectorAll('input[name="paymentMethod"]');
      if (radios[0]) { radios[0].checked = true; }
      document.getElementById('transportCost').value = '';
      document.getElementById('discountValue').value = '';
      document.getElementById('lineItemsContainer').innerHTML = '';
      lineCounter = 0; lineState = {};
      addLine(); recalcDeposit();
    }

    // ─── HISTORY ──────────────────────────────────────────────────────────────
    function toggleHistory() {
      historyOpen = !historyOpen;
      document.getElementById('historyBody').classList.toggle('open', historyOpen);
      document.getElementById('historyChevron').classList.toggle('open', historyOpen);
      if (historyOpen && historyRows.length === 0) { fetchAndRenderHistory(); }
    }

    function fetchAndRenderHistory() {
      var content = document.getElementById('historyContent');
      content.innerHTML = '<p style="color:var(--text-muted);font-size:12px;padding:8px 0;">' + t('historyLoading') + '</p>';
      var cbName = '_glgSlabCb' + Date.now(); var done = false;
      window[cbName] = function(raw) {
        done = true;
        try {
          var rows = parseGvizTable(raw);
          historyRows = rows; renderHistoryTable(rows); rebuildCustomerList(rows);
        } catch(err) {
          content.innerHTML = '<p style="color:var(--error);font-size:12px;">' + t('historyError') + '</p>';
        }
        delete window[cbName];
      };
      var s = document.createElement('script');
      s.src = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?sheet=Slab_Records&tqx=responseHandler:' + cbName;
      s.onerror = function() { if (!done) { content.innerHTML = '<p style="color:var(--error);font-size:12px;">' + t('historyFail') + '</p>'; } };
      document.head.appendChild(s);
      setTimeout(function() { if (!done) { content.innerHTML = '<p style="color:var(--error);font-size:12px;">' + t('historyTimeout') + '</p>'; } }, 8000);
    }

    // 0 Timestamp | 1 OrderID | 2 SaleDate | 3 CustomerName | 4 SlabName
    // 5 Length | 6 Width | 7 Thickness | 8 AreaSqM | 9 PricePerM2
    // 10 LineTotal | 11 OrderTotal | 12 Deposit | 13 PaymentMethod | 14 ToCollect | 15 OrderNotes
    function parseGvizTable(raw) {
      var rows = [];
      if (!raw || !raw.table || !raw.table.rows) { return rows; }
      for (var i = 0; i < raw.table.rows.length; i++) {
        var r = raw.table.rows[i];
        if (!r || !r.c) { continue; }
        function cell(idx) {
          return (r.c[idx] && r.c[idx].v !== null && r.c[idx].v !== undefined) ? r.c[idx].v : '';
        }
        function parseGvizDate(v) {
          if (!v) { return ''; }
          if (typeof v === 'string' && v.indexOf('Date(') === 0) {
            var p = v.slice(5, -1).split(',').map(Number);
            return new Date(Date.UTC(p[0], p[1], p[2], p[3]||0, p[4]||0, p[5]||0)).toISOString();
          }
          return String(v);
        }
        rows.push({
          timestamp: parseGvizDate(cell(0)), orderId: cell(1),
          saleDate: parseGvizDate(cell(2)), customerName: cell(3), slabName: cell(4),
          itemName: cell(5),
          length: cell(6), width: cell(7), thickness: cell(8), areaSqM: cell(9), pricePerM2: cell(10),
          lineTotal: cell(11), orderTotal: cell(12), transportCost: cell(13),
          discountZl: cell(14), discountLabel: cell(15),
          deposit: cell(16), paymentMethod: cell(17), toCollect: cell(18), orderNotes: cell(19)
        });
      }
      return rows;
    }

    function renderHistoryTable(rows) {
      var content = document.getElementById('historyContent');
      document.getElementById('historyCount').textContent = rows.length;
      if (rows.length === 0) {
        content.innerHTML = '<p style="color:var(--text-muted);font-size:12px;padding:8px 0;">' + t('historyNone') + '</p>';
        return;
      }
      var seenOrders = {};
      var html = '<div class="history-table-wrap"><table><thead><tr>' +
        '<th>' + t('hOrder')    + '</th><th>' + t('hDate')     + '</th>' +
        '<th>' + t('hCustomer') + '</th><th>' + t('hSlab')     + '</th>' +
        '<th>' + t('hDims')     + '</th><th>' + t('hThick')    + '</th>' +
        '<th>' + t('hArea')     + '</th><th>' + t('hPriceM2')  + '</th>' +
        '<th>' + t('hLine')     + '</th><th>' + t('hDeposit')  + '</th>' +
        '<th>' + t('hPayment')  + '</th><th>' + t('hTotal')    + '</th>' +
        '</tr></thead><tbody>';

      var reversed = rows.slice().reverse();
      for (var i = 0; i < reversed.length; i++) {
        var r = reversed[i];
        var isNew = !seenOrders[r.orderId];
        seenOrders[r.orderId] = true;
        var pmVal = String(r.paymentMethod || '').toLowerCase();
        var pmCls = pmVal.indexOf('bank') !== -1 ? 'bank' : 'cash';
        var pmText = r.paymentMethod
          ? (pmVal.indexOf('bank') !== -1 ? t('paymentBank') : t('paymentCash')) : '';
        var rowCls = (isNew && i > 0) ? ' class="order-break"' : '';
        html += '<tr' + rowCls + '>';
        html += '<td>' + (isNew ? '<span class="order-ref">' + esc(r.orderId || '\u2014') + '</span>' : '') + '</td>';
        html += '<td>' + fmtDate(r.saleDate) + '</td>';
        html += '<td>' + esc(r.customerName) + '</td>';
        html += '<td>' + esc(r.slabName) + '</td>';
        html += '<td>' + (r.length && r.width ? Math.round(r.length) + '&times;' + Math.round(r.width) : '\u2014') + '</td>';
        html += '<td>' + (r.thickness ? Math.round(r.thickness) + ' cm' : '\u2014') + '</td>';
        html += '<td>' + (r.areaSqM ? parseFloat(r.areaSqM).toFixed(2) + ' m\u00b2' : '\u2014') + '</td>';
        html += '<td>' + (r.pricePerM2 ? fmtCurrency(parseFloat(r.pricePerM2)) : '\u2014') + '</td>';
        html += '<td style="font-weight:500;">' + (r.lineTotal ? fmtCurrency(parseFloat(r.lineTotal)) : '\u2014') + '</td>';
        html += '<td>' + (isNew && r.deposit ? fmtCurrency(parseFloat(r.deposit)) : '') + '</td>';
        html += '<td>' + (isNew && pmText ? '<span class="payment-tag ' + pmCls + '">' + pmText + '</span>' : '') + '</td>';
        html += '<td style="color:var(--gold);font-weight:500;">' + (isNew && r.orderTotal ? fmtCurrency(parseFloat(r.orderTotal)) : '') + '</td>';
        html += '</tr>';
      }
      html += '</tbody></table></div>';
      content.innerHTML = html;
    }

    // ─── CUSTOMER AUTOCOMPLETE ────────────────────────────────────────────────
    function prefetchCustomers() {
      var cbName = '_glgCustCb' + Date.now();
      window[cbName] = function(raw) {
        try {
          var rows = parseGvizTable(raw);
          rebuildCustomerList(rows);
          if (rows.length > 0) { historyRows = rows; }
        } catch(e) {}
        delete window[cbName];
      };
      var s = document.createElement('script');
      s.src = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?sheet=Slab_Records&tqx=responseHandler:' + cbName;
      document.head.appendChild(s);
    }

    function rebuildCustomerList(rows) {
      var names = {};
      for (var i = 0; i < rows.length; i++) { if (rows[i].customerName) { names[rows[i].customerName] = true; } }
      var dl = document.getElementById('customerList'); dl.innerHTML = '';
      var keys = Object.keys(names);
      for (var j = 0; j < keys.length; j++) {
        var opt = document.createElement('option'); opt.value = keys[j]; dl.appendChild(opt);
      }
    }

    function clearHistoryCache() {
      historyRows = [];
      document.getElementById('historyContent').innerHTML = '<p style="color:var(--text-muted);font-size:12px;">' + t('historyEmpty') + '</p>';
      document.getElementById('historyCount').textContent = '\u2014';
    }

    // ─── HELPERS ─────────────────────────────────────────────────────────────
    function todayISO() { return new Date().toISOString().slice(0, 10); }
    function fmtCurrency(val) { return Math.ceil(val).toLocaleString('en-GB') + ' z\u0142'; }
    function fmtDate(isoStr) {
      if (!isoStr) { return '\u2014'; }
      var d = new Date(isoStr);
      return isNaN(d) ? isoStr.slice(0, 10) : d.toLocaleDateString('en-GB');
    }
    function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function setStatus(type, msg) {
      var el = document.getElementById('statusMsg'); var bg, color, border;
      if (type === 'success') { bg = 'var(--success-bg)'; color = 'var(--success)'; border = 'var(--success-border)'; }
      else if (type === 'error') { bg = 'var(--error-bg)'; color = 'var(--error)'; border = 'var(--error-border)'; }
      else { bg = 'var(--info-bg)'; color = 'var(--info)'; border = 'var(--info-border)'; }
      el.style.cssText = 'background:' + bg + ';color:' + color + ';border:1px solid ' + border + ';display:block;padding:10px 14px;border-radius:3px;margin-bottom:10px;';
      el.textContent = msg;
    }
  </script>
</body>
</html>
